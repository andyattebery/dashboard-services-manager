---
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: src/global.json
          cache: true
          cache-dependency-path: src/**/*.csproj
      - name: Restore
        run: dotnet restore src/Dsm.sln
      - name: Build
        run: dotnet build src/Dsm.sln --no-restore
      - name: Test (non-network)
        run: dotnet test --solution src/Dsm.sln --no-build --filter "TestCategory!=Network"

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API Docker images
        uses: docker/build-push-action@v7
        with:
          file: docker/api.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/andyattebery/dashboard-services-manager:api-latest
      - name: Build and push Provider Docker images
        uses: docker/build-push-action@v7
        with:
          file: docker/provider.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/andyattebery/dashboard-services-manager:provider-latest
