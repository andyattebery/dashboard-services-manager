---
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Run shell steps from src/ so `dotnet` finds src/global.json (which sets the SDK
    # version pin and the test.runner = Microsoft.Testing.Platform setting that the
    # MTP-native `dotnet test --solution` syntax depends on). Only affects `run:` steps;
    # `uses:` steps still run from the repo root, so action inputs use repo-root paths.
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v6
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: src/global.json
          cache: true
          cache-dependency-path: src/**/*.csproj
      - name: Restore
        run: dotnet restore Dsm.sln
      # Test job uses the default shallow checkout. /p:DisableGitVersionTask=true
      # skips GitVersion.MsBuild's git read so we don't need fetch-depth: 0 here.
      - name: Build
        run: dotnet build Dsm.sln --no-restore /p:DisableGitVersionTask=true
      - name: Test (non-network)
        run: dotnet test --solution Dsm.sln --no-build --filter "TestCategory!=Network"

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      # GitVersion needs full git history. The GitTools docs are explicit:
      # "If the pipeline is set up to use a shallow git fetch mode the
      # GitVersion Execute action will fail. It is required to use fetch-depth: 0."
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: '6.7.x'
      - name: Determine Version
        id: version_step
        uses: gittools/actions/gitversion/execute@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API Docker images
        uses: docker/build-push-action@v7
        with:
          file: docker/api.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ env.semVer }}
          tags: |
            ghcr.io/andyattebery/dashboard-services-manager:api-${{ env.semVer }}
            ghcr.io/andyattebery/dashboard-services-manager:api-latest
      - name: Build and push Provider Docker images
        uses: docker/build-push-action@v7
        with:
          file: docker/provider.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ env.semVer }}
          tags: |
            ghcr.io/andyattebery/dashboard-services-manager:provider-${{ env.semVer }}
            ghcr.io/andyattebery/dashboard-services-manager:provider-latest
