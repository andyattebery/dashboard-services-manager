---
name: ci

on:
  push:
    branches: [main]
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Run shell steps from src/ so `dotnet` finds src/global.json (which sets the SDK
    # version pin and the test.runner = Microsoft.Testing.Platform setting that the
    # MTP-native `dotnet test --solution` syntax depends on). Only affects `run:` steps;
    # `uses:` steps still run from the repo root, so action inputs use repo-root paths.
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v6
      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: src/global.json
          cache: true
          # The action's default cache-dependency-path only checks the repo root,
          # not recursively, so it has to be pointed at src/ where our lock files live.
          cache-dependency-path: src/**/packages.lock.json
      - name: Restore
        run: dotnet restore Dsm.sln --locked-mode
      # Test job uses the default shallow checkout. /p:DisableGitVersionTask=true
      # skips GitVersion.MsBuild's git read so we don't need fetch-depth: 0 here.
      - name: Build
        run: dotnet build Dsm.sln --no-restore /p:DisableGitVersionTask=true
      - name: Test (non-network)
        run: dotnet test --solution Dsm.sln --no-build --filter "TestCategory!=Network"

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6
      - name: Compute version
        id: version
        # Strip leading "v" so 1.0.0 and v1.0.0 both produce identical image tags.
        # is_release is "true" only for clean SemVer (no "-" suffix); used to gate :latest.
        run: |
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          TAG: ${{ github.ref_name }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Versioned tags push first; :latest is promoted in a final step (below) only if
      # both versioned pushes succeeded. If either of these build steps fails, the
      # job fails before the promote step runs, so :latest is never half-moved.
      - name: Build and push API image (versioned)
        uses: docker/build-push-action@v7
        with:
          file: docker/api.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: ghcr.io/andyattebery/dashboard-services-manager:api-${{ steps.version.outputs.version }}
      - name: Build and push Provider image (versioned)
        uses: docker/build-push-action@v7
        with:
          file: docker/provider.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: ghcr.io/andyattebery/dashboard-services-manager:provider-${{ steps.version.outputs.version }}
      - name: Promote :latest tags
        # imagetools create rewrites the manifest at -t to point at the existing
        # versioned manifest — no rebuild, no layer re-push, multi-arch preserved.
        if: steps.version.outputs.is_release == 'true'
        run: |
          docker buildx imagetools create \
            -t ghcr.io/andyattebery/dashboard-services-manager:api-latest \
            ghcr.io/andyattebery/dashboard-services-manager:api-${VERSION}
          docker buildx imagetools create \
            -t ghcr.io/andyattebery/dashboard-services-manager:provider-latest \
            ghcr.io/andyattebery/dashboard-services-manager:provider-${VERSION}
        env:
          VERSION: ${{ steps.version.outputs.version }}
