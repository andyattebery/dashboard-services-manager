---
name: ci

on:
  push:
    branches: [main]
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and release (e.g. 1.1.0 or v1.1.0)'
        required: true

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Run shell steps from src/ so `dotnet` finds src/global.json (which sets the SDK
    # version pin and the test.runner = Microsoft.Testing.Platform setting that the
    # MTP-native `dotnet test --solution` syntax depends on). Only affects `run:` steps;
    # `uses:` steps still run from the repo root, so action inputs use repo-root paths.
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v6
      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: src/global.json
          cache: true
          # The action's default cache-dependency-path only checks the repo root,
          # not recursively, so it has to be pointed at src/ where our lock files live.
          cache-dependency-path: src/**/packages.lock.json
      - name: Restore
        run: dotnet restore Dsm.sln --locked-mode
      # Test job uses the default shallow checkout. /p:DisableGitVersionTask=true
      # skips GitVersion.MsBuild's git read so we don't need fetch-depth: 0 here.
      - name: Build
        run: dotnet build Dsm.sln --no-restore /p:DisableGitVersionTask=true
      - name: Test (non-network)
        run: dotnet test --solution Dsm.sln --no-build --filter "TestCategory!=Network"

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Compute version
        id: version
        # Strip leading "v" so 1.0.0 and v1.0.0 both produce identical image tags.
        # is_release is "true" only for clean SemVer (no "-" suffix); used to gate :latest.
        run: |
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Versioned tags push first; :latest is promoted in a final step (below) only if
      # both versioned pushes succeeded. If either of these build steps fails, the
      # job fails before the promote step runs, so :latest is never half-moved.
      - name: Build and push API image (versioned)
        uses: docker/build-push-action@v7
        with:
          file: docker/api.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: ghcr.io/andyattebery/dashboard-services-manager:api-${{ steps.version.outputs.version }}
      - name: Build and push Provider image (versioned)
        uses: docker/build-push-action@v7
        with:
          file: docker/provider.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: ghcr.io/andyattebery/dashboard-services-manager:provider-${{ steps.version.outputs.version }}
      - name: Promote :latest tags
        # imagetools create rewrites the manifest at -t to point at the existing
        # versioned manifest — no rebuild, no layer re-push, multi-arch preserved.
        if: steps.version.outputs.is_release == 'true'
        run: |
          docker buildx imagetools create \
            -t ghcr.io/andyattebery/dashboard-services-manager:api-latest \
            ghcr.io/andyattebery/dashboard-services-manager:api-${VERSION}
          docker buildx imagetools create \
            -t ghcr.io/andyattebery/dashboard-services-manager:provider-latest \
            ghcr.io/andyattebery/dashboard-services-manager:provider-${VERSION}
        env:
          VERSION: ${{ steps.version.outputs.version }}

  build-binaries:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: src
    strategy:
      matrix:
        rid:
          - linux-x64
          - linux-arm64
          - osx-x64
          - osx-arm64
          - win-x64
          - win-arm64
        app:
          - name: Dsm.Manager.Api
            asset_name: dsm-api
          - name: Dsm.Provider.App
            asset_name: dsm-provider
        include:
          - rid: linux-x64
            asset_rid: linux-x64
            archive_ext: tar.gz
          - rid: linux-arm64
            asset_rid: linux-arm64
            archive_ext: tar.gz
          - rid: osx-x64
            asset_rid: macos-x64
            archive_ext: tar.gz
          - rid: osx-arm64
            asset_rid: macos-arm64
            archive_ext: tar.gz
          - rid: win-x64
            asset_rid: win-x64
            archive_ext: zip
          - rid: win-arm64
            asset_rid: win-arm64
            archive_ext: zip
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: src/global.json
          cache: true
          cache-dependency-path: src/**/packages.lock.json
      - name: Compute version
        id: version
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
      - name: Publish
        run: >-
          dotnet publish ${{ matrix.app.name }}/${{ matrix.app.name }}.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained
          --output publish/${{ matrix.app.asset_name }}
          /p:PublishSingleFile=true
          /p:EnableCompressionInSingleFile=true
          /p:Version=${{ steps.version.outputs.version }}
          /p:DisableGitVersionTask=true
      - name: Create archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        run: >-
          tar -czf
          ${{ matrix.app.asset_name }}-${{ steps.version.outputs.version }}-${{ matrix.asset_rid }}.${{ matrix.archive_ext }}
          -C publish/${{ matrix.app.asset_name }}
          .
      - name: Create archive (zip)
        if: matrix.archive_ext == 'zip'
        run: >-
          cd publish/${{ matrix.app.asset_name }} &&
          zip -r
          ../../${{ matrix.app.asset_name }}-${{ steps.version.outputs.version }}-${{ matrix.asset_rid }}.${{ matrix.archive_ext }}
          .
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.app.asset_name }}-${{ matrix.asset_rid }}
          path: src/${{ matrix.app.asset_name }}-${{ steps.version.outputs.version }}-${{ matrix.asset_rid }}.${{ matrix.archive_ext }}
          if-no-files-found: error
          retention-days: 1

  github-release:
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      contents: write
      actions: write
    steps:
      - name: Compute version
        id: version
        run: |
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub release
        run: >-
          gh release create "$TAG"
          artifacts/*
          --repo "${{ github.repository }}"
          --title "v${{ steps.version.outputs.version }}"
          --generate-notes
          ${{ steps.version.outputs.prerelease == 'true' && '--prerelease' || '' }}
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Trigger flake update
        run: gh workflow run update-flake.yml --repo "${{ github.repository }}" -f tag="$TAG"
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
